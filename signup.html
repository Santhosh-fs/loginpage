<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>login</title>
    <style>
      * {
        margin: 0px;
        background-color: whitesmoke;
      }

      h1 {
        margin-left: 25px;

        color: royalblue;
        font-family: fantasy;
      }

      #signup {
        display: inline-block;
        position: relative;
        justify-content: center;
        margin-left: 40%;
        margin-top: 10%;
        width: 300px;
        height: fit-content;
        border: 1px rgb(206, 196, 198) solid;
        box-shadow: 5px;
      }

      button {
        display: block;
        margin-left: 4rem;
        width: 150px;
        height: 40px;
        border-radius: 20px;
        box-shadow: 10px;
        transition: 0.3 ease-in;
        margin-top: 1rem;
        margin-bottom: 40px;
        font-weight: 500;
        color: steelblue;
        font-size: 1rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      button:hover {
        background-color: seagreen;
      }

      .email {
        display: block;
        margin-left: 4rem;
        margin-top: 20px;
        margin-bottom: 10px;
        width: 200px;
        height: 45px;
      }

      .password {
        display: block;
        margin-left: 4rem;
        margin-bottom: 10px;
        width: 200px;
        height: 45px;
      }

      a {
        display: inline;
        font-family: Arial, Helvetica, sans-serif;
      }

      h4 {
        display: inline;
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>

  <body>
    <form>
      <div id="signup">
        <div>
          <h1>SIGN UP</h1>
        </div>
        <div class="name">
          <input
            type="text"
            placeholder="enter the name"
            name="name"
            readonly
          />
        </div>
        <div class="email">
          <input
            type="text"
            name="name"
            placeholder="email or mobile no"
            required
          />
        </div>
        <div class="password">
          <input
            type="password"
            name="password"
            placeholder="enter the password"
            required
          />
        </div>
        <button>Signup</button>
      </div>
    </form>
  </body>
</html>
