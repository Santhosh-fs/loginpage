<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Login</title>
    <style>
      * {
        margin: 0px;
        background-color: whitesmoke;
      }

      .log {
        color: antiquewhite;
        text-decoration: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      h1 {
        margin-left: 25px;
        margin-bottom: 4rem;
        color: royalblue;
        font-family: fantasy;
      }

      #login {
        display: inline-block;
        position: relative;
        justify-content: center;
        margin-left: 35%;
        margin-top: 8%;
        width: 350px;
        height: 400px;
        border: 1px rgb(206, 196, 198) solid;
        box-shadow: 5px;
        padding: 20px;
        background-color: white;
      }

      button {
        display: block;
        width: 70%;
        height: 40px;
        border-radius: 20px;
        box-shadow: 10px;
        transition: 0.3s ease-in;
        margin-top: 1rem;
        margin-left: 3rem;
        margin-bottom: 30px;
        font-weight: 500;
        color: steelblue;
        font-size: 1rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        cursor: pointer;
      }

      button:hover {
        background-color: orangered;
      }

      .email,
      .password {
        text-align: start;
        width: 80%;
        height: 2rem;
        padding-top: 10px;
        padding-left: 20px;
        padding-right: 30px;
        margin-bottom: 10px;
        margin-left: 20px;
      }

      a {
        font-family: Arial, Helvetica, sans-serif;
        text-decoration: none;
        color: royalblue;
      }

      a:hover {
        text-decoration: underline;
      }

      h4 {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 10px;
      }

      span {
        color: red;
      }
    </style>
  </head>
  <body>
    <form action="index.html" method="post">
      <div id="login">
        <div>
          <h1>LOG <SPAN>IN</SPAN></h1>
        </div>

        <div class="email">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="password">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="submit">Login</button>
        <div>
          <p>
            Don't have an account?
            <a href="signup.html">Create a new account</a>
          </p>
        </div>
      </div>
    </form>
  </body>
</html>
